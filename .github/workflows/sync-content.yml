name: Sync content from tyfi-content

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [content-updated]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-content
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tyfi-portfolio
        uses: actions/checkout@v4
        with:
          path: portfolio
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout tyfi-content
        uses: actions/checkout@v4
        with:
          repository: ty-fi/tyfi-content
          path: content
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Diff and copy content
        id: sync
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/portfolio"

          declare -A DIRS=(
            [content/works]=src/content/work
            [content/press]=src/content/press
            [content/pdfs]=public/files
          )

          added=()
          updated=()
          skipped=()

          for src in "${!DIRS[@]}"; do
            dest="${DIRS[$src]}"
            mkdir -p "$dest"

            [ -d "../$src" ] || continue

            while IFS= read -r -d '' f; do
              base="$(basename "$f")"
              case "$base" in _*) continue ;; esac
              rel="${f#../$src/}"
              dst="$dest/$rel"
              mkdir -p "$(dirname "$dst")"
              if [ ! -f "$dst" ]; then
                cp "$f" "$dst"
                added+=("$dst")
              elif ! cmp -s "$f" "$dst"; then
                cp "$f" "$dst"
                updated+=("$dst")
              else
                skipped+=("$dst")
              fi
            done < <(find "../$src" -type f -print0)
          done

          added_count=${#added[@]}
          updated_count=${#updated[@]}
          has_changes=$([ "$added_count" -gt 0 ] || [ "$updated_count" -gt 0 ] && echo true || echo false)

          {
            echo "added<<EOF"
            printf -- '- %s\n' "${added[@]}"
            echo "EOF"
            echo "updated<<EOF"
            printf -- '- %s\n' "${updated[@]}"
            echo "EOF"
            echo "added_count=$added_count"
            echo "updated_count=$updated_count"
            echo "has_changes=$has_changes"
          } >> "$GITHUB_OUTPUT"

          echo "::notice::Added: $added_count, Updated: $updated_count, Skipped: ${#skipped[@]}"

      - name: Ensure content-sync label exists
        if: steps.sync.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create content-sync \
            --color "0e8a16" \
            --description "Automated content sync from ty-fi/tyfi-content" \
            --force

      - name: Open sync PR
        if: steps.sync.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/portfolio"

          branch="sync/content-$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$branch"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/work src/content/press public/files

          if git diff --cached --quiet; then
            echo "::notice::No staged changes; aborting"
            exit 0
          fi

          {
            echo "## Content sync from ty-fi/tyfi-content"
            echo ""
            echo "Auto-generated by \`sync-content.yml\`. \`check.yml\` will validate the build; merge to publish via \`deploy.yml\`."
            echo ""
            echo "### Added (${{ steps.sync.outputs.added_count }})"
            echo "${{ steps.sync.outputs.added }}"
            echo ""
            echo "### Updated (${{ steps.sync.outputs.updated_count }})"
            echo "${{ steps.sync.outputs.updated }}"
            echo ""
            echo "### Notes"
            echo "- **No deletions are propagated.** To remove a published entry, delete it here directly."
            echo "- \`_*\` files (e.g. \`_template.mdx\`, \`_example-mdx.mdx\`) in this repo are preserved."
          } > .sync-body.md

          git commit -F .sync-body.md
          git push origin "$branch"

          gh pr create \
            --title "Sync content from ty-fi/tyfi-content" \
            --body-file .sync-body.md \
            --base main \
            --head "$branch" \
            --label content-sync

          rm .sync-body.md

      - name: Summary
        if: always()
        run: |
          echo "::notice::Sync complete — added=${{ steps.sync.outputs.added_count }}, updated=${{ steps.sync.outputs.updated_count }}"
